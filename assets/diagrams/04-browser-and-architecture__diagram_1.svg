</g>
<g class="node" data-id="C" data-label="localhost HTTP server" data-shape="rectangle">
  <rect x="385.14300000000003" y="40" width="176.81199999999998" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="473.54900000000004" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">localhost HTTP server</text>
</g>
